{% extends "base.html" %}
{% block title %}Настройки — Yukitery{% endblock %}

{% block content %}
<div style="max-width: 580px; margin: 0 auto;">
    <h1 class="page-title">Настройки профиля</h1>

    <form method="POST" enctype="multipart/form-data" class="card">
        <div class="form-group" style="text-align:center;">
            <div class="profile-avatar" style="width:80px;height:80px;margin:0 auto 12px;font-size:2rem;">
                {% if user.avatar %}
                    <img src="{{ url_for('uploaded_file', filename=user.avatar) }}" alt="">
                {% else %}
                    {{ user.username[0]|upper }}
                {% endif %}
            </div>
            <label class="btn btn-ghost btn-sm" style="cursor:pointer;position:relative;">
                📷 Сменить аватар
                <input type="file" name="avatar" accept="image/*" style="position:absolute;opacity:0;inset:0;cursor:pointer;">
            </label>
        </div>
        <div class="form-group">
            <label class="form-label">О себе</label>
            <textarea name="bio" class="form-textarea" rows="3" maxlength="500" placeholder="Расскажите немного о себе...">{{ user.bio }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Телефон</label>
                <input type="text" name="phone" class="form-input" value="{{ user.phone }}" placeholder="+7..." maxlength="20">
            </div>
            <div class="form-group">
                <label class="form-label">Город</label>
                <input type="text" name="city" class="form-input" value="{{ user.city }}" placeholder="Москва" maxlength="100">
            </div>
        </div>
        <button type="submit" class="btn btn-accent btn-block btn-lg">Сохранить</button>
    </form>
</div>
{% endblock %}
