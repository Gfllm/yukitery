{% extends "base.html" %}

{% block title %}Страница не найдена - K.Pavely{% endblock %}

{% block content %}
<div class="error-container container">
    <div class="error-code">404</div>
    <h1 class="error-message">Страница не найдена</h1>
    <p style="color: var(--text-secondary); margin-bottom: 30px;">Извините, запрашиваемая страница не существует.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Вернуться на главную</a>
</div>
{% endblock %}
