{% extends "base.html" %}

{% block title %}Вход - K.Pavely{% endblock %}

{% block content %}
<div class="form-container container">
    <h1 class="form-title">Вход для админа</h1>
    
    <form method="POST">
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Введите пароль администратора" required autofocus>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            🔑 Войти
        </button>
    </form>
    
    <a href="{{ url_for('index') }}" class="btn btn-secondary" style="margin-top: 15px; width: 100%; text-align: center;">
        ← На главную
    </a>
</div>
{% endblock %}
