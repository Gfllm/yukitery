{% extends "base.html" %}

{% block title %}Вход - K.Pavely{% endblock %}

{% block content %}
<div class="form-container container">
    <h1 class="form-title">Вход</h1>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Введите логин" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Введите пароль" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            🔑 Войти
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <p style="color: var(--text-secondary);">Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a></p>
    </div>
    
    <a href="{{ url_for('index') }}" class="btn btn-secondary" style="margin-top: 15px; width: 100%; text-align: center;">
        ← На главную
    </a>
</div>
{% endblock %}
