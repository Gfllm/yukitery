{% extends "base.html" %}
{% block title %}Вход — Yukitery{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-title">Вход в аккаунт</div>
        <p class="auth-subtitle">С возвращением в Yukitery</p>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label class="form-label">Логин или Email</label>
                <input type="text" name="login" class="form-input" placeholder="username или email" required autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-input" placeholder="Ваш пароль" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-accent btn-block btn-lg">Войти</button>
        </form>

        <div class="auth-footer">
            Нет аккаунта? <a href="{{ url_for('register') }}">Зарегистрироваться</a>
        </div>
    </div>
</div>
{% endblock %}
