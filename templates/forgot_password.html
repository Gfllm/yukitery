{% extends "base.html" %}

{% block title %}Восстановление пароля - K.Pavely{% endblock %}

{% block content %}
<div class="form-container container">
    <h1 class="form-title">Восстановление пароля</h1>
    
    <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">
        Введите ваш email, и мы отправим код для сброса пароля.
    </p>
    
    <form method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Ваш email" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            📧 Отправить код
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <p style="color: var(--text-secondary);">Вспомнили пароль? <a href="{{ url_for('login') }}">Войти</a></p>
    </div>
    
    <a href="{{ url_for('index') }}" class="btn btn-secondary" style="margin-top: 15px; width: 100%; text-align: center;">
        ← На главную
    </a>
</div>
{% endblock %}
