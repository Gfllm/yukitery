{% extends "base.html" %}

{% block title %}Добавить объявление - K.Pavely{% endblock %}

{% block content %}
<div class="form-container container">
    <h1 class="form-title">Добавить объявление</h1>
    
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Название запчасти *</label>
            <input type="text" id="name" name="name" class="form-control" placeholder="Например: Фильтр масляный" required>
        </div>
        
        <div class="form-group">
            <label for="price">Цена (BYN) *</label>
            <input type="number" id="price" name="price" class="form-control" placeholder="Например: 50" min="0" step="0.01" required>
        </div>
        
        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" class="form-control" placeholder="Дополнительная информация о запчасти..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Фотография</label>
            <div class="file-upload">
                <input type="file" name="photo" accept="image/*">
                <div class="file-upload-icon">📷</div>
                <div class="file-upload-text">Нажмите или перетащите фото</div>
            </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            ✅ Добавить объявление
        </button>
    </form>
    
    <a href="{{ url_for('index') }}" class="btn btn-secondary" style="margin-top: 15px; width: 100%; text-align: center;">
        ← Назад
    </a>
</div>
{% endblock %}
