{% extends "base.html" %}
{% block title %}Редактировать — Yukitery{% endblock %}

{% block content %}
<div style="max-width: 680px; margin: 0 auto;">
    <h1 class="page-title">Редактировать объявление</h1>

    <form method="POST" enctype="multipart/form-data" class="card">
        <div class="form-group">
            <label class="form-label">Заголовок</label>
            <input type="text" name="title" class="form-input" value="{{ listing.title }}" required minlength="3">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Категория</label>
                <select name="category_id" class="form-select">
                    <option value="">Без категории</option>
                    {% for c in categories %}
                    <option value="{{ c.id }}" {% if listing.category_id == c.id %}selected{% endif %}>{{ c.icon }} {{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Цена (₽)</label>
                <input type="number" name="price" class="form-input" value="{{ listing.price }}" min="0">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Город</label>
            <input type="text" name="city" class="form-input" value="{{ listing.city }}">
        </div>
        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-textarea" required minlength="10" rows="6">{{ listing.description }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Статус</label>
            <select name="status" class="form-select">
                <option value="active" {% if listing.status == 'active' %}selected{% endif %}>Активно</option>
                <option value="closed" {% if listing.status == 'closed' %}selected{% endif %}>Закрыто</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Добавить фото</label>
            <div class="file-input-wrapper">
                <input type="file" name="images" multiple accept="image/*">
                <div class="file-input-label">📷 <span>Добавить фото</span></div>
            </div>
        </div>
        <button type="submit" class="btn btn-accent btn-block btn-lg">Сохранить</button>
    </form>
</div>
{% endblock %}
