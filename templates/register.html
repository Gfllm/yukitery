{% extends "base.html" %}

{% block title %}Регистрация - K.Pavely{% endblock %}

{% block content %}
<div class="form-container container">
    <h1 class="form-title">Регистрация</h1>
    
    <form method="POST">
        <div class="form-group">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" class="form-control" placeholder="Придумайте логин" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="Ваш email" required>
        </div>
        
        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Пароль (минимум 4 символа)" minlength="4" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            📝 Зарегистрироваться
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 20px;">
        <p style="color: var(--text-secondary);">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
    </div>
    
    <a href="{{ url_for('index') }}" class="btn btn-secondary" style="margin-top: 15px; width: 100%; text-align: center;">
        ← На главную
    </a>
</div>
{% endblock %}
