{% extends "base.html" %}

{% block title %}Сброс пароля - K.Pavely{% endblock %}

{% block content %}
<div class="form-container container">
    <h1 class="form-title">Сброс пароля</h1>
    
    <form method="POST">
        <div class="form-group">
            <label for="code">Код из email</label>
            <input type="text" id="code" name="code" class="form-control" placeholder="6-значный код" maxlength="6" required autofocus>
        </div>
        
        <div class="form-group">
            <label for="password">Новый пароль</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Новый пароль (мин. 4 символа)" minlength="4" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            🔑 Изменить пароль
        </button>
    </form>
    
    <a href="{{ url_for('index') }}" class="btn btn-secondary" style="margin-top: 15px; width: 100%; text-align: center;">
        ← На главную
    </a>
</div>
{% endblock %}
